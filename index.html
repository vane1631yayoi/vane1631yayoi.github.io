    <!-- 引入 Firebase/Firestore 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        
        // Firestore 服務全域變數
        let db;
        let auth;
        let userId = null;
        let isAuthReady = false;
        let isListenerAttached = false; // <-- 新增：防止重複監聽

        // 檢查並初始化 Firebase
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        
        // 確保設定日誌級別為 Debug
        setLogLevel('Debug');

        async function setupFirebase() {
            if (!firebaseConfig) {
                console.error("Firebase config is missing. Data persistence will not work.");
                return;
            }
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // 處理認證
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("Firebase Auth Ready. User ID:", userId);
                    } else {
                        // 匿名登入作為後備
                        await signInAnonymously(auth);
                        userId = auth.currentUser.uid;
                        console.log("Signed in anonymously. User ID:", userId);
                    }
                    isAuthReady = true;
                    
                    // 認證完成後，設定 Firestore 監聽
                    window.loadChecklists(); 
                });

                // 使用 custom token 登入 (Canvas 環境專用)
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    // 若無 token，則使用 onAuthStateChanged 處理匿名登入
                }

            } catch (error) {
                console.error("Firebase setup failed:", error);
                // 如果初始化失敗，至少讓 UI 知道並顯示錯誤
                window.renderErrorState("Firebase 初始化失敗，請檢查配置。");
            }
        }
        
        // 將 Firestore 函式暴露給全域環境，讓主腳本可以使用
        window.db = () => db;
        window.getLuggageDocRef = () => {
             // 儲存於私人空間：/artifacts/{appId}/users/{userId}/luggage_checklists/data/main
            if (!db || !userId) return null;
            return doc(db, `artifacts/${appId}/users/${userId}/luggage_checklists`, 'main');
        };
        window.setDoc = setDoc;
        window.onSnapshot = onSnapshot;
        window.isAuthReady = () => isAuthReady;
        window.auth = () => auth;

        setupFirebase();
    </script>

        const OPENWEATHER_API_KEY = "YOUR_OPENWEATHERMAP_API_KEY"; // **請替換為您的 OpenWeatherMap API Key**
        const weatherCache = {}; // 用於快取天氣資料，避免重複請求

        // OpenWeatherMap 的天氣圖標映射 (簡化版)
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙', // clear sky
            '02d': '🌤️', '02n': '☁️', // few clouds
            '03d': '☁️', '03n': '☁️', // scattered clouds

        /**
         * 根據地點獲取即時天氣資料
         * @param {string} locationQuery - 地點名稱 (e.g., "Nagoya, JP")
         * @returns {Promise<Object|null>} 包含天氣描述和溫度的物件，或 null (如果失敗)
         */
        async function fetchWeatherData(locationQuery) {
            if (!OPENWEATHER_API_KEY || OPENWEATHER_API_KEY === "YOUR_OPENWEATHERMAP_API_KEY") {
                console.warn("OpenWeatherMap API Key is not set. Please replace 'YOUR_OPENWEATHERMAP_API_KEY' with your actual key.");
                return null;
            }
            if (weatherCache[locationQuery]) {
                return weatherCache[locationQuery];
            }
            try {
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(locationQuery)}&appid=${OPENWEATHER_API_KEY}&units=metric&lang=zh_tw`
                );
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                const weatherInfo = {
                    description: data.weather[0].description,
                    temperature: Math.round(data.main.temp),
                    icon: weatherIcons[data.weather[0].icon] || '❓' // 使用圖標映射
                };
                weatherCache[locationQuery] = weatherInfo; // 快取資料
                return weatherInfo;   
            } catch (error) {
                console.error(`Failed to fetch weather for ${locationQuery}:`, error);
                return null;
            }
        }

         */
        function selectDay(dayIndex) {
            // 1. 更新按鈕的 Active 狀態
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('tab-active', 'primary-bg');
                btn.classList.add('bg-white', 'text-gray-800');
            });
            // 為當前點擊的按鈕添加 active 樣式
            const currentBtn = document.getElementById(`day-tab-${dayIndex}`);
            if (currentBtn) {
                currentBtn.classList.remove('bg-white', 'text-gray-800');
                currentBtn.classList.add('tab-active', 'primary-bg', 'text-white');
                
                currentBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // 2. 渲染對應的行程內容
            renderItinerary(dayIndex);
        }

        /**
         * 動態生成頂部的 Tab 按鈕並綁定事件
         */
        function setupTabs() {
            travelItinerary.forEach((dayPlan, index) => {
                const button = document.createElement('button');
                button.id = `day-tab-${index}`;
                // 初始樣式
                button.className = 'tab-button bg-white text-gray-800 rounded-xl shadow-md p-3 mx-2 flex-shrink-0';
                button.innerHTML = `
                    <p class="text-sm text-gray-500">${dayPlan.date.split(' ')[0]}</p>
                    <p class="text-lg font-semibold">${dayPlan.day}</p>
                `;
                
                // 點擊事件：呼叫 selectDay 函式
                button.addEventListener('click', () => selectDay(index));
                
                tabsContainer.appendChild(button);
            });
            
            // 預設選中並顯示 Day 1
            selectDay(0);
        }
        
        // 頁面載入完成後執行設定
        window.onload = function(){
            setupTabs();
            // Firebase setup (已在 type="module" script 區塊執行)
        };
                        

    </script>
</body>
</html>
